server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54321}/${DB_NAME:smart_cloud_brain}}
    username: ${DB_USERNAME:scb}
    password: ${DB_PASSWORD:scb_password}
    driver-class-name: ${DB_DRIVER_CLASS:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:scb}
    password: ${RABBITMQ_PASSWORD:scb_password}

management:
  endpoints:
    web:
      exposure:
        include: health,info

notification:
  websocket:
    allowed-origin-patterns: ${NOTIFICATION_WS_ALLOWED_ORIGINS:http://localhost:5174,http://127.0.0.1:5174}

