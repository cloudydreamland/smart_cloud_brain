# ===== 公共配置（提交到 Git） =====
# 本地配置放 application-dev.yml（不提交，每人用自己的数据库）

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: diagnosis-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_cloud_brain}
    username: ${DB_USER:scb}
    password: ${DB_PASS:scb_password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: ${AI_SERVICE_TIMEOUT_MS:5000}
            read-timeout: ${AI_SERVICE_TIMEOUT_MS:5000}
            logger-level: basic

management:
  endpoints:
    web:
      exposure:
        include: health,info

knife4j:
  enable: true

services:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8081}
