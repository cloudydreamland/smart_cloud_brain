server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: diagnosis-service
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_cloud_brain}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:scb}
    password: ${DB_PASSWORD:scb_password}
    driver-class-name: ${DB_DRIVER_CLASS:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: ${AI_SERVICE_TIMEOUT_MS:5000}
            read-timeout: ${AI_SERVICE_TIMEOUT_MS:5000}
            logger-level: basic

management:
  endpoints:
    web:
      exposure:
        include: health,info

knife4j:
  enable: true

services:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8081}
