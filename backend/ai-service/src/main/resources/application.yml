server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ai-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

knife4j:
  enable: true

ai:
  provider: ${AI_PROVIDER:mock}
  base-url: ${AI_BASE_URL:}
  api-key: ${AI_API_KEY:}
  timeout-ms: ${AI_TIMEOUT_MS:8000}
  dify:
    base-url: ${DIFY_BASE_URL:http://localhost/v1}
    triage-api-key: ${DIFY_TRIAGE_API_KEY:}
    medical-record-api-key: ${DIFY_MEDICAL_RECORD_API_KEY:}
    prescription-check-api-key: ${DIFY_PRESCRIPTION_CHECK_API_KEY:}
