server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54321}/${DB_NAME:smart_cloud_brain}}
    username: ${DB_USERNAME:scb}
    password: ${DB_PASSWORD:scb_password}
    driver-class-name: ${DB_DRIVER_CLASS:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:scb}
    password: ${RABBITMQ_PASSWORD:scb_password}

management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:smart-cloud-brain-local-secret-please-change}
  expire-hours: ${JWT_EXPIRE_HOURS:24}

services:
  notification:
    base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8089}

patient:
  email-code:
    ttl-minutes: ${PATIENT_EMAIL_CODE_TTL_MINUTES:10}
    hash-secret: ${PATIENT_EMAIL_CODE_HASH_SECRET:${JWT_SECRET:smart-cloud-brain-local-secret-please-change}}


