server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: admin-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54321}/${DB_NAME:smart_cloud_brain}}
    username: ${DB_USERNAME:scb}
    password: ${DB_PASSWORD:scb_password}
    driver-class-name: ${DB_DRIVER_CLASS:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:scb}
    password: ${RABBITMQ_PASSWORD:scb_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: ${REDIS_CACHE_TTL:10m}

management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info

services:
  patient:
    base-url: ${PATIENT_SERVICE_BASE_URL:http://localhost:8083}
  doctor:
    base-url: ${DOCTOR_SERVICE_BASE_URL:http://localhost:8084}
  triage:
    base-url: ${TRIAGE_SERVICE_BASE_URL:http://localhost:8086}
  notification:
    base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8089}
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8081}

scb:
  object-storage:
    provider: ${SCB_OBJECT_STORAGE_PROVIDER:aliyun-oss}
    endpoint: ${SCB_OBJECT_STORAGE_ENDPOINT:}
    region: ${SCB_OBJECT_STORAGE_REGION:}
    bucket: ${SCB_OBJECT_STORAGE_BUCKET:}
    public-base-url: ${SCB_OBJECT_STORAGE_PUBLIC_BASE_URL:}
    access-key-id: ${SCB_OBJECT_STORAGE_ACCESS_KEY_ID:}
    access-key-secret: ${SCB_OBJECT_STORAGE_ACCESS_KEY_SECRET:}
    upload-prefix: ${SCB_OBJECT_STORAGE_UPLOAD_PREFIX:patient-site}
    max-size-bytes: ${SCB_OBJECT_STORAGE_MAX_SIZE_BYTES:5242880}
    policy-expires-seconds: ${SCB_OBJECT_STORAGE_POLICY_EXPIRES_SECONDS:600}
    force-path-style: ${SCB_OBJECT_STORAGE_FORCE_PATH_STYLE:false}


