app:
  description: 根据启用医生、科室、日期范围和已有排班生成可解释的门诊排班建议，由后端强校验后交管理员确认发布。
  icon: 📅
  icon_background: '#E8F3FF'
  icon_type: emoji
  mode: workflow
  name: 智慧云脑-AI排班建议
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
