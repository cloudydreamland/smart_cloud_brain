          text: '{{#1781953000001.promptTemplate#}}

            输出结构：{{#1781953000001.outputSchema#}}

            开始日期：{{#1781953000001.startDate#}}，天数：{{#1781953000001.days#}}

            启用医生JSON：{{#1781953000001.doctors#}}

            科室JSON：{{#1781953000001.departments#}}

            已有排班JSON：{{#1781953000001.existingSchedules#}}

            上次校验反馈：{{#1781953000001.validationFeedback#}}

            只允许使用给定医生和其所属科室；workDate最早必须是开始日期，最晚是开始日期加天数减1，禁止使用范围外或其他示例日期；不得与已有排班重复；时段使用HH:mm-HH:mm；容量为1-100。严格返回紧凑JSON，不要Markdown，格式为：{"suggestions":[{"doctorId":1,"departmentId":1,"workDate":"{{#1781953000001.startDate#}}","timeRange":"09:00-12:00","capacity":12,"reason":"理由"}]}。'
