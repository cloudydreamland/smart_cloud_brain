services:
  mysql:
    image: mysql:8.4
    container_name: scb-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-smart_cloud_brain}
      MYSQL_USER: ${DB_USERNAME:-scb}
      MYSQL_PASSWORD: ${DB_PASSWORD:-scb_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ..
      dockerfile: backend/ai-service/Dockerfile
    container_name: scb-ai-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-8000}
      TZ: Asia/Shanghai
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  diagnosis-service:
    build:
      context: ..
      dockerfile: backend/diagnosis-service/Dockerfile
    container_name: scb-diagnosis-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-smart_cloud_brain}
      DB_USERNAME: ${DB_USERNAME:-scb}
      DB_PASSWORD: ${DB_PASSWORD:-scb_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-local-env}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      AI_SERVICE_BASE_URL: http://ai-service:8081
      AI_SERVICE_TIMEOUT_MS: ${AI_SERVICE_TIMEOUT_MS:-5000}
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: scb-nginx
    restart: unless-stopped
    depends_on:
      - diagnosis-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro

volumes:
  mysql-data:
