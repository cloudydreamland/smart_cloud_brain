server:
  port: ${SERVER_PORT:8081}

ai:
  provider: ${AI_PROVIDER:openai}
  timeout-ms: ${AI_TIMEOUT_MS:8000}
  openai:
    base-url: ${OPENAI_BASE_URL:}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:}
  dify:
    base-url: ${DIFY_BASE_URL:}
    api-key: ${DIFY_API_KEY:}

knife4j:
  enable: true
