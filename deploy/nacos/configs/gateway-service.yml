server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/patient/register,/api/patient/login,/api/doctor/login,/api/admin/login,/internal/auth/**
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patient/**,/internal/patients/**
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/doctor/**,/internal/doctors/**
        - id: registration-service
          uri: lb://registration-service
          predicates:
            - Path=/api/registration/**,/internal/registrations/**
        - id: triage-service
          uri: lb://triage-service
          predicates:
            - Path=/api/triage/**,/internal/triage-records/**
        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/api/medical-record/**
        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/prescription/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notification/**,/internal/notifications/**
        - id: notification-websocket
          uri: lb:ws://notification-service
          predicates:
            - Path=/ws/notifications
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**,/api/search/**
